<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>趣味英语跟读｜曹冲称象</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FFF5E6;padding:15px;font-family:微软雅黑}
.wrap{max-width:100%;margin:0 auto;background:#fff;padding:20px;border-radius:20px}
h3{text-align:center;color:#FF7A2F;margin-bottom:15px;font-size:22px}
.tip-text{color:#666;font-size:14px;text-align:center;margin-bottom:10px}
.progress-bar{background:#f1f1f1;border-radius:20px;height:14px;margin:10px 0}
.progress-fill{background:#4CD964;height:100%;width:0%;transition:0.3s}
.info-text{text-align:center;color:#777;font-size:14px;margin:8px 0}

/* 🔥 核心修复：保证单词完整不断行，只在空格处换行 */
.sentence-box{
padding:18px;
font-size:17px;
line-height:1.8;
border:3px dashed #5CC8FF;
border-radius:16px;
margin:15px 0;
background:#F8FBFF;
text-align:center;

white-space: normal;
word-break: keep-all;      /* 不拆分单词 */
overflow-wrap: normal;     /* 只在空格换行 */
word-wrap: normal;
}

.cn-explain{
margin-top:12px;
font-size:14px;
color:#666;
padding-top:10px;
border-top:1px dashed #cce8ff;
}
.ani1{animation:fadeIn 0.7s}
.ani2{animation:slideIn 0.7s}
.ani3{animation:bounceIn 0.7s}
.ani4{animation:scaleIn 0.7s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes bounceIn{0%{transform:scale(0.4);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes scaleIn{from{transform:scale(0.6) rotate(-5deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

.word{
display: inline-block; /* 🔥 关键：让单词永远完整 */
padding:2px 4px;
margin:0 2px;
border-radius:5px;
}
.word:active{background:#FFE873;color:#ff5500}

.btn-group{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:15px 0}
.btn{padding:10px 14px;border:none;border-radius:25px;color:#fff;font-size:15px}
.btn:active{transform:scale(0.96)}
.btn1{background:#54A0FF}
.btn2{background:#37D179}
.btn3{background:#FF6B6B}
.btn4{background:#9368E9}
.ok{background:#E8FFEF;color:#229944;padding:10px;border-radius:10px;margin-top:12px;text-align:center}
.err{background:#FFF0F0;color:#E53E3E;padding:10px;border-radius:10px;margin-top:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<h3>🐘 曹冲称象 趣味英语跟读</h3>
<p class="tip-text">跟读录音，可回放自己读音对比练习</p>
<div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
<p class="info-text">进度：<span id="p">0</span>/<span id="t">0</span></p>
<div class="sentence-box" id="box"></div>
<div class="btn-group">
<button class="btn btn1" onclick="aiRead()">🔊 AI领读</button>
<button class="btn btn2" onclick="startRecord()">🎤 开始录音</button>
<button class="btn btn4" onclick="playMyVoice()">🔁 回放我的读音</button>
<button class="btn btn1" onclick="prevSentence()">⬅️ 上一句</button>
<button class="btn btn1" onclick="nextSentence()">➡️ 下一句</button>
<button class="btn btn3" onclick="resetAll()">🔄 重置</button>
</div>
<div id="feedback"></div>
</div>

<script>
const sentenceList=[
{en:"Hello everyone!",cn:"大家好！"},
{en:"Today I’d like to share a wonderful Chinese wisdom story with you.",cn:"今天分享一则中国智慧小故事。"},
{en:"Its name is Cao Chong Weighs the Elephant.",cn:"故事名叫曹冲称象。"},
{en:"Long long ago, someone gave a big elephant to Cao Cao.",cn:"很久以前，有人送给曹操一头大象。"},
{en:"Everyone was very curious about the elephant’s weight.",cn:"众人都好奇大象的重量。"},
{en:"But the elephant was huge, there was no big scale to weigh it.",cn:"大象体型庞大，没有合适的秤称重。"},
{en:"Many adults tried their best to think of useful ways.",cn:"大人们纷纷思索解决办法。"},
{en:"Some people wanted to cut the elephant into small pieces.",cn:"有人提议把大象切块称重。"},
{en:"However, it was a bad idea and nobody agreed.",cn:"这个方案不可行，没人赞同。"},
{en:"At this moment, little Cao Chong came up with a smart idea.",cn:"这时年幼的曹冲想出妙计。"},
{en:"He asked people to lead the big elephant onto a boat.",cn:"他让人把大象牵到船上。"},
{en:"The boat sank down slowly, and they drew a line on the boat.",cn:"船体下沉，众人在船身做好标记。"},
{en:"Then they took the elephant back to the bank.",cn:"随后将大象带回岸边。"},
{en:"After that, they put many stones on the boat one by one.",cn:"接着往船上堆放石头。"},
{en:"They stopped adding stones when the boat reached the line.",cn:"船身下沉到标记处就停止放石。"},
{en:"Finally, they weighed all the stones on the boat.",cn:"最后称量船上所有石头。"},
{en:"The total weight of the stones was exactly the elephant’s weight.",cn:"石头总重等同于大象体重。"},
{en:"Cao Chong was just a little kid, but he solved a hard problem.",cn:"曹冲年纪小小，却破解难题。"},
{en:"He used simple ways to fix difficult things.",cn:"巧用简单方法化解难题。"},
{en:"This is the great wisdom of ancient Chinese people.",cn:"这是古人非凡的智慧。"},
{en:"We should learn to think smart and be creative in our life.",cn:"生活中我们也要灵活思考。"},
{en:"Thank you everyone!",cn:"谢谢大家！"}
];
const animations=["ani1","ani2","ani3","ani4"];
let currentIndex=0;
const total=sentenceList.length;
document.getElementById("t").innerText=total;
let voiceReady=false;
let mediaRecorder;
let audioChunks=[];
let myAudio=null;

function openVoice(){
    if(!voiceReady){
        let testVoice=new SpeechSynthesisUtterance("hi");
        testVoice.lang="en-US";
        speechSynthesis.speak(testVoice);
        voiceReady=true;
    }
}

function speakVoice(text){
    if(!voiceReady) openVoice();
    let voice=new SpeechSynthesisUtterance(text);
    voice.lang="en-US";
    voice.rate=0.85;
    voice.pitch=1.05;
    speechSynthesis.speak(voice);
}

function speakWord(word){
    speakVoice(word);
    document.getElementById("feedback").innerHTML="";
}

function aiRead(){
    speakVoice(sentenceList[currentIndex].en);
    document.getElementById("feedback").innerHTML="";
}

async function startRecord(){
    try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder=new MediaRecorder(stream);
        audioChunks=[];
        myAudio=null;
        document.getElementById("feedback").innerHTML='<div class="ok">🎙️ 正在录音，请跟读句子...</div>';

        mediaRecorder.ondataavailable=e=>{
            audioChunks.push(e.data);
        };
        mediaRecorder.onstop=()=>{
            const audioBlob=new Blob(audioChunks,{type:'audio/wav'});
            const audioUrl=URL.createObjectURL(audioBlob);
            myAudio=new Audio(audioUrl);
            document.getElementById("feedback").innerHTML='<div class="ok">✅ 录音完成，点击回放按钮听自己读音</div>';
        };
        mediaRecorder.start();
        setTimeout(()=>{
            if(mediaRecorder.state==="recording"){
                mediaRecorder.stop();
                stream.getTracks().forEach(track=>track.stop());
            }
        },5000);
    }catch(err){
        document.getElementById("feedback").innerHTML='<div class="err">❌ 无法获取麦克风权限，请允许授权</div>';
    }
}

function playMyVoice(){
    if(myAudio){
        myAudio.play();
        document.getElementById("feedback").innerHTML='<div class="ok">🔁 正在播放你的读音</div>';
    }else{
        document.getElementById("feedback").innerHTML='<div class="err">⚠️ 暂无录音，请先点击开始录音</div>';
    }
}

function renderSingle(){
    let item=sentenceList[currentIndex];
    let words=item.en.split(" ");
    let enHtml="";
    words.forEach(w=>{
        let cleanWord=w.replace(/[,.!]/g,"");
        enHtml+=`<span class="word" ontouchstart="speakWord('${cleanWord}')">${w}</span>`;
    });
    let aniType=animations[currentIndex%4];
    document.getElementById("box").innerHTML=`${enHtml}<div class="cn-explain">${item.cn}</div>`;
    document.getElementById("box").className="sentence-box "+aniType;
    document.getElementById("p").innerText=currentIndex+1;
    document.getElementById("progressBar").style.width=(currentIndex+1)/total*100+"%";
}

function prevSentence(){
    if(currentIndex>0){
        currentIndex--;
        renderSingle();
    }
}
function nextSentence(){
    if(currentIndex<total-1){
        currentIndex++;
        renderSingle();
    }
}
function resetAll(){
    currentIndex=0;
    myAudio=null;
    renderSingle();
}

document.addEventListener("touchstart",openVoice);
document.addEventListener("click",openVoice);
renderSingle();
</script>
</body>
</html>
