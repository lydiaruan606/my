<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>趣味英语跟读｜曹冲称象</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FFF5E6;padding:15px;font-family:"圆体","微软雅黑"}
.wrap{max-width:100%;margin:0 auto;background:#ffffff;padding:20px;border-radius:20px;box-shadow:0 4px 15px #ffd8b8}
h3{text-align:center;color:#FF7A2F;margin-bottom:20px;font-size:22px;text-shadow:1px 1px 2px #ffe0c0}
.tip-text{color:#666;font-size:14px;margin-bottom:10px;text-align:center}
.progress-bar{background:#f1f1f1;border-radius:20px;height:14px;margin:10px 0;overflow:hidden}
.progress-fill{background:#4CD964;height:100%;transition:0.3s;width:0%}
.info-text{text-align:center;color:#777;font-size:14px;margin:8px 0}
.sentence-box{
padding:18px;
font-size:17px;
line-height:1.8;
border:3px dashed #5CC8FF;
border-radius:16px;
margin:15px 0;
min-height:auto;
text-align:center;
background:#F8FBFF;
word-wrap:break-word;
overflow-wrap:break-word;
}
.cn-explain{
margin-top:12px;
font-size:14px;
color:#666;
padding-top:10px;
border-top:1px dashed #cce8ff;
line-height:1.7;
}
.ani1{animation: fadeIn 0.7s ease forwards}
.ani2{animation: slideIn 0.7s ease forwards}
.ani3{animation: bounce 0.7s ease forwards}
.ani4{animation: scaleIn 0.7s ease forwards}
@keyframes fadeIn{from{opacity:0} to{opacity:1}}
@keyframes slideIn{from{transform:translateX(-40px);opacity:0} to{transform:translateX(0);opacity:1}}
@keyframes bounce{0%{transform:scale(0.4);opacity:0} 60%{transform:scale(1.1)} 100%{transform:scale(1)}}
@keyframes scaleIn{from{transform:scale(0.6) rotate(-5deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1}}
.word{cursor:pointer;padding:2px 4px;margin:0 2px;border-radius:5px;transition:0.2s;display:inline-block}
.word:hover{background:#FFE873;color:#ff5500}
.btn-group{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:15px 0}
.btn{padding:10px 14px;border:none;border-radius:25px;color:#fff;font-size:15px;font-weight:bold;cursor:pointer;transition:0.2s}
.btn:hover{transform:scale(1.05)}
.btn1{background:#54A0FF}
.btn2{background:#37D179}
.btn3{background:#FF6B6B}
.ok{background:#E8FFEF;color:#229944;padding:10px;border-radius:10px;font-size:14px;margin-top:12px;text-align:center}
.err{background:#FFF0F0;color:#E53E3E;padding:10px;border-radius:10px;font-size:14px;margin-top:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<h3>🐘 曹冲称象 趣味英语跟读</h3>
<p class="tip-text">认真跟读，轻松学会英文小故事</p>

<div class="progress-bar">
    <div class="progress-fill" id="progressBar"></div>
</div>
<p class="info-text">学习进度：<span id="p">0</span> / <span id="t">0</span></p>

<div class="sentence-box" id="box"></div>

<div class="btn-group">
<button class="btn btn1" onclick="aiRead()">🔊 AI领读</button>
<button class="btn btn2" onclick="startSpeak()">🎤 跟读打分</button>
<button class="btn btn1" onclick="prevSentence()">⬅️ 上一句</button>
<button class="btn btn1" onclick="nextSentence()">➡️ 下一句</button>
<button class="btn btn3" onclick="resetAll()">🔄 重新开始</button>
</div>

<div id="feedback"></div>
</div>

<script>
const sentenceList = [
    {en:"Hello everyone!",cn:"大家好！"},
    {en:"Today I’d like to share a wonderful Chinese wisdom story with you.",cn:"今天我给大家分享一个充满中国智慧的小故事。"},
    {en:"Its name is Cao Chong Weighs the Elephant.",cn:"故事名字叫做曹冲称象。"},
    {en:"Long long ago, someone gave a big elephant to Cao Cao.",cn:"很久很久以前，有人送给曹操一头大象。"},
    {en:"Everyone was very curious about the elephant’s weight.",cn:"所有人都好奇大象有多重。"},
    {en:"But the elephant was huge, there was no big scale to weigh it.",cn:"可是大象体型庞大，没有大秤能够称重。"},
    {en:"Many adults tried their best to think of useful ways.",cn:"大人们都努力想出各种办法。"},
    {en:"Some people wanted to cut the elephant into small pieces.",cn:"有人提议把大象切成小块来称重。"},
    {en:"However, it was a bad idea and nobody agreed.",cn:"这个办法并不可行，大家都不赞同。"},
    {en:"At this moment, little Cao Chong came up with a smart idea.",cn:"这时小小的曹冲想出了一个好主意。"},
    {en:"He asked people to lead the big elephant onto a boat.",cn:"他让人把大象赶到小船上面。"},
    {en:"The boat sank down slowly, and they drew a line on the boat.",cn:"船身慢慢下沉，大家在船身画上标记线。"},
    {en:"Then they took the elephant back to the bank.",cn:"随后将大象牵回岸边。"},
    {en:"After that, they put many stones on the boat one by one.",cn:"接着往船上一块块堆放石头。"},
    {en:"They stopped adding stones when the boat reached the line.",cn:"直到船身下沉到刚刚的标记线为止。"},
    {en:"Finally, they weighed all the stones on the boat.",cn:"最后大家称量船上所有石头的重量。"},
    {en:"The total weight of the stones was exactly the elephant’s weight.",cn:"石头的总重量就等于大象的体重。"},
    {en:"Cao Chong was just a little kid, but he solved a hard problem.",cn:"曹冲年纪虽小，却解决了难题。"},
    {en:"He used simple ways to fix difficult things.",cn:"他用巧妙简单的方法化解困难。"},
    {en:"This is the great wisdom of ancient Chinese people.",cn:"这就是古人了不起的智慧。"},
    {en:"We should learn to think smart and be creative in our life.",cn:"生活里我们也要学会灵活思考。"},
    {en:"Thank you everyone!",cn:"谢谢大家！"}
];
const animations = ["ani1","ani2","ani3","ani4"];
let currentIndex = 0;
const total = sentenceList.length;
document.getElementById("t").innerText = total;

function speakVoice(text){
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.rate = 0.85;
    speech.pitch = 1.05;
    speech.volume = 1;
    speechSynthesis.speak(speech);
}

function speakWord(word){
    speakVoice(word);
    document.getElementById("feedback").innerHTML = "";
}

function aiRead(){
    const text = sentenceList[currentIndex].en;
    speakVoice(text);
    document.getElementById("feedback").innerHTML = "";
}

function renderSingle(){
    let item = sentenceList[currentIndex];
    let enSen = item.en;
    let cnSen = item.cn;
    let words = enSen.split(" ");
    let enHtml = "";
    words.forEach(w=>{
        let pure = w.replace(/[,.!]/g,"");
        enHtml += `<span class='word' onclick='speakWord("${pure}")'>${w}</span>`;
    });
    let ani = animations[currentIndex % 4];
    let boxHtml = `${enHtml}<div class="cn-explain">${cnSen}</div>`;
    document.getElementById("box").innerHTML = boxHtml;
    document.getElementById("box").className = "sentence-box " + ani;
    document.getElementById("p").innerText = currentIndex + 1;
    let per = (currentIndex + 1) / total * 100;
    document.getElementById("progressBar").style.width = per + "%";
}

function startSpeak(){
    if(!window.webkitSpeechRecognition){
        document.getElementById("feedback").innerHTML = "<div class='err'>请使用谷歌浏览器，并允许麦克风权限哦</div>";
        return;
    }
    let recog = new webkitSpeechRecognition();
    recog.lang = "en-US";
    recog.start();
    document.getElementById("feedback").innerHTML = "<div style='text-align:center'>😆 小嘴巴跟着读一读吧</div>";
    recog.onresult = function(e){
        let userText = e.results[0][0].transcript.toLowerCase().trim();
        let standardText = sentenceList[currentIndex].en.toLowerCase();
        if(standardText.includes(userText)){
            document.getElementById("feedback").innerHTML = "<div class='ok'>🎉 太棒啦！发音超标准</div>";
        }else{
            document.getElementById("feedback").innerHTML = "<div class='err'>💪 再跟着AI多读几遍就更好咯</div>";
        }
    }
}

function prevSentence(){
    if(currentIndex > 0){
        currentIndex--;
        renderSingle();
    }
}
function nextSentence(){
    if(currentIndex < total - 1){
        currentIndex++;
        renderSingle();
    }
}
function resetAll(){
    currentIndex = 0;
    renderSingle();
}

renderSingle();
</script>
</body>
</html>
